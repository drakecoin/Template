# Netlify build configuration for the Kerbside web app.
# The app lives in the `kerbside/` subdirectory of this repo, so the build runs
# from there. `publish` is resolved relative to `base`.

[build]
  base = "kerbside"
  command = "npm run build"
  publish = "web/dist"

[build.environment]
  NODE_VERSION = "22"

# Single-page app: serve index.html for any path the SPA/PWA handles client-side.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# The service worker must revalidate so PWA updates reach users promptly.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Vite fingerprints asset filenames, so they can be cached forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
